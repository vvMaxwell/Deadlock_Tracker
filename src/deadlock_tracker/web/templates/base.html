<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Deadlock Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/site.css') }}">
</head>
<body>
    <div class="site-backdrop"></div>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand-mark" href="/">
                <span class="brand-kicker">Deadlock</span>
                <strong>Tracker</strong>
            </a>
            <nav class="site-nav">
                <a href="/">Search</a>
                <a href="/#platform">Platform</a>
            </nav>
        </header>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
