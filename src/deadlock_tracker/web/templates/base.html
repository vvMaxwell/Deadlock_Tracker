<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Deadlock Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/site.css') }}">
</head>
<body>
    <div class="site-backdrop"></div>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand-mark" href="/">
                <span class="brand-kicker">Deadlock</span>
                <strong>Tracker</strong>
            </a>
            <nav class="site-nav">
                <a class="site-nav-search" href="/">
                    <span class="site-nav-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="img" focusable="false">
                            <path d="M10.5 4a6.5 6.5 0 1 1 0 13 6.5 6.5 0 0 1 0-13Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Zm5.86 10.44 3.1 3.1-1.42 1.42-3.1-3.1 1.42-1.42Z" fill="currentColor"/>
                        </svg>
                    </span>
                    <span>Search</span>
                </a>
                <a class="site-nav-new site-nav-spotlight site-nav-spotlight-street-brawl" href="/street-brawl-builds">
                    <span>Street Brawl Builds</span>
                    <span class="site-nav-badge">NEW!</span>
                </a>
                <a class="site-nav-spotlight site-nav-spotlight-heroes" href="/best-heroes">Best Heroes</a>
                <a class="site-nav-spotlight site-nav-spotlight-items" href="/best-items">Best Items</a>
                <a class="site-nav-coming-soon" href="/discord-bot">
                    <span>Discord Bot</span>
                    <span class="site-nav-badge site-nav-badge-muted">Coming Soon</span>
                </a>
                <a href="/faq">FAQ</a>
            </nav>
        </header>
        {% block content %}{% endblock %}
        <footer class="site-footer">
            <div class="site-footer-links">
                <a href="/credits">Credits</a>
                <a href="/disclaimers">Disclaimers</a>
            </div>
        </footer>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
